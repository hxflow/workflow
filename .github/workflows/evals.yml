name: update-evals-accuracy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run eval scenarios and update evals.json
        id: run_evals
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const childProcess = require('node:child_process')

          try {
            const root = process.cwd()
            const evalsPath = path.join(root, 'evals.json')

            const base = JSON.parse(fs.readFileSync(evalsPath, 'utf8'))
            const suite = base.suite && typeof base.suite === 'object' ? base.suite : {}
            const cases = Array.isArray(suite.cases) ? suite.cases : []
            const hasCases = cases.length > 0
            const DEFAULT_EXPECTED_EXIT_CODE = 0
            const DEFAULT_WEIGHT = 1
            const PERCENTAGE_MULTIPLIER = 100
            const ACCURACY_PRECISION = 2
            const ALLOWED_COMMANDS = new Set(['npm', 'bun', 'node'])

            let weightedPassed = 0
            let weightedTotal = 0
            let passed = 0
            let failed = 0
            const results = []
            const sanitizeWeight = (value) => (typeof value === 'number' && value > 0 ? value : DEFAULT_WEIGHT)

            for (const [index, testCase] of cases.entries()) {
              const caseId = testCase.id ?? `case-${index + 1}`
              const weight = sanitizeWeight(testCase.weight)
              const command = Array.isArray(testCase.command) ? testCase.command : []
              const commandName = command[0]
              if (
                command.length === 0
                || typeof commandName !== 'string'
                || !ALLOWED_COMMANDS.has(commandName)
              ) {
                failed += 1
                results.push({
                  id: caseId,
                  passed: false,
                  reason: 'invalid-command',
                  expectedExitCode: testCase.expect?.exitCode ?? DEFAULT_EXPECTED_EXIT_CODE,
                  actualExitCode: null,
                })
                weightedTotal += weight
                continue
              }

              const expectedExitCode = Number.isInteger(testCase.expect?.exitCode)
                ? testCase.expect.exitCode
                : DEFAULT_EXPECTED_EXIT_CODE
              const run = childProcess.spawnSync(command[0], command.slice(1), {
                cwd: root,
                encoding: 'utf8',
              })

              const actualExitCode = typeof run.status === 'number' ? run.status : null
              const runPassed = actualExitCode === expectedExitCode

              if (runPassed) {
                passed += 1
                weightedPassed += weight
              } else {
                failed += 1
              }

              weightedTotal += weight
              results.push({
                id: caseId,
                passed: runPassed,
                expectedExitCode,
                actualExitCode,
              })
            }

            const total = hasCases ? passed + failed : null
            const accuracy = hasCases && weightedTotal > 0
              ? Number(((weightedPassed / weightedTotal) * PERCENTAGE_MULTIPLIER).toFixed(ACCURACY_PRECISION))
              : null
            const hasFailures = hasCases && failed > 0
            const exitCode = hasCases ? (hasFailures ? 1 : 0) : null
            const parseWarning = hasCases ? null : 'No eval scenarios configured in evals.json suite.cases'

            const updated = {
              ...base,
              updatedAt: new Date().toISOString(),
              metrics: {
                accuracy,
                passed,
                failed,
                total,
              },
              suite: {
                ...suite,
                runner: 'scenario',
                results,
              },
              lastRun: {
                status: exitCode === null ? 'unknown' : (exitCode === 0 ? 'passed' : 'failed'),
                exitCode,
                parseWarning,
              },
            }

            fs.writeFileSync(evalsPath, `${JSON.stringify(updated, null, 2)}\n`, 'utf8')
            const outputPath = process.env.GITHUB_OUTPUT
            if (!outputPath) {
              throw new Error('GITHUB_OUTPUT is not set')
            }
            fs.appendFileSync(outputPath, `exit_code=${exitCode === null ? '' : String(exitCode)}\n`)
            fs.appendFileSync(outputPath, `run_status=${updated.lastRun.status}\n`)
          } catch (error) {
            console.error('Failed to update evals.json:', error)
            process.exit(1)
          }
          NODE

      - name: Commit evals.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals.json
          if git diff --cached --quiet; then
            echo "evals.json has no changes"
            exit 0
          fi
          git commit -m "chore: update evals accuracy"
          git push

      - name: Fail if evals failed
        if: steps.run_evals.outputs.run_status == 'failed'
        run: |
          echo "Eval scenarios failed"
          exit 1
