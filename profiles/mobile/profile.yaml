# Mobile Team Profile (通用，跨 iOS/Android/HarmonyOS)
name: mobile
label: 移动端
task_prefix: TASK-MB
supported_platforms: [ios, android, harmony]

# ── 架构层级（Clean Architecture 变体，三端通用）──
architecture:
  layers:
    - id: domain
      label: Domain
      path: "{platform_src}/domain/"
      description: 实体定义、业务规则接口、值对象，纯逻辑无平台依赖
      can_import: []

    - id: data
      label: Data
      path: "{platform_src}/data/"
      description: 数据源实现（网络请求、本地存储、缓存策略）
      can_import: [domain]

    - id: presentation
      label: Presentation
      path: "{platform_src}/presentation/"
      description: ViewModel / 状态管理，将 Domain 数据转化为 UI 状态
      can_import: [domain, data]

    - id: ui
      label: UI
      path: "{platform_src}/ui/"
      description: 视图层（SwiftUI / Compose / ArkUI），只做渲染和用户交互
      can_import: [domain, presentation]

  cross_cutting:
    - DI Container（依赖注入，各平台实现不同）
    - Network Layer（统一网络层，平台适配在 data 层）
    - Analytics（埋点 SDK，通过接口抽象）
    - Push Notification（推送，平台特化在 platforms/ 中定义）

# ── 任务拆分规则 ──
task_split:
  strategy: clean_arch  # Domain → Data → Presentation → UI → Test
  order: [domain, data, presentation, ui, test]
  template:
    - id: "{PREFIX}-01"
      name: Domain 层
      output: "{platform_src}/domain/{feature}/"
      description: 实体定义、Use Case 接口、Repository 协议

    - id: "{PREFIX}-02"
      name: Data 层
      output: "{platform_src}/data/{feature}/"
      description: API 请求实现、本地缓存、Repository 实现

    - id: "{PREFIX}-03"
      name: Presentation 层
      output: "{platform_src}/presentation/{feature}/"
      description: ViewModel、状态管理、UI 事件处理

    - id: "{PREFIX}-04"
      name: UI 层
      output: "{platform_src}/ui/{feature}/"
      description: 页面视图、组件、导航

    - id: "{PREFIX}-05"
      name: 单元测试
      output: "{platform_test}/{feature}/"
      description: Domain + Presentation 层测试，Mock Data 层

# ── 代码审查重点 ──
review_focus:
  must:
    - 架构层级合规：UI 层是否直接调用 Data 层（必须经过 Presentation）
    - Domain 层是否引入了平台特定 API（必须保持纯逻辑）
    - 内存管理：是否有潜在的循环引用 / 内存泄漏
    - 线程安全：UI 更新是否在主线程
  recommend:
    - 离线场景处理：网络不可用时的降级策略
    - 深色模式 / 动态字体适配
    - 横竖屏切换是否正常
    - 启动性能：新增代码是否影响冷启动时间

# ── QA 验收要求 ──
qa:
  must:
    - 逐条验证 AC
    - 在真机（非模拟器）上验证核心路径
    - 弱网环境（3G 模拟）下测试 API 调用
    - 最低支持系统版本上验证
  recommend:
    - 内存泄漏检测（Instruments / LeakCanary / DevEco Profiler）
    - 压力测试：快速反复操作是否崩溃
    - 无障碍：VoiceOver / TalkBack / 无障碍服务
