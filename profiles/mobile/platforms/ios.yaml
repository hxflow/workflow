# iOS Platform Override
platform: ios
label: iOS
language: Swift
ui_framework: SwiftUI
min_version: "iOS 16.0"

# ── 路径映射 ──
paths:
  platform_src: "ios/Sources"
  platform_test: "ios/Tests"
  project_file: "ios/*.xcodeproj"

# ── 任务 ID 前缀覆盖 ──
task_prefix: TASK-IOS

# ── 架构层级路径特化 ──
layer_paths:
  domain: "ios/Sources/Domain/"
  data: "ios/Sources/Data/"
  presentation: "ios/Sources/Presentation/"
  ui: "ios/Sources/UI/"

# ── 语言特定约束 ──
constraints:
  - 使用 Swift Concurrency（async/await），禁止裸 DispatchQueue 调用
  - 网络请求使用 URLSession + Codable，禁止第三方网络库（除非 profile 另行指定）
  - UI 层使用 SwiftUI，UIKit 仅用于不可替代的场景（需在需求文档中说明原因）
  - ViewModel 使用 @Observable（iOS 17+）或 ObservableObject + @Published
  - 禁止 force unwrap（!），使用 guard let / if let

# ── 审查追加项 ──
review_extra:
  - 是否正确使用 @MainActor 标注 UI 更新
  - Combine/async 订阅是否在 deinit 时取消
  - 是否有不必要的 @State / @StateObject 重建
  - Xcode 静态分析（Analyze）是否有警告

# ── 门控命令 ──
gate_commands:
  lint: "swiftlint lint --strict"
  build: "xcodebuild build -scheme {scheme} -destination 'platform=iOS Simulator,name=iPhone 15'"
  test: "xcodebuild test -scheme {scheme} -destination 'platform=iOS Simulator,name=iPhone 15'"

# ── QA 追加项 ──
qa_extra:
  - 在 iPhone SE（最小屏）和 iPhone 15 Pro Max（最大屏）各测一次
  - Dark Mode 下视觉检查
  - Instruments 检查内存泄漏（Leaks 模板）
