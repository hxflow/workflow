# HarmonyOS Platform Override
platform: harmony
label: HarmonyOS (鸿蒙)
language: ArkTS
ui_framework: ArkUI
min_version: "HarmonyOS NEXT (API 12)"

# ── 路径映射 ──
paths:
  platform_src: "harmony/entry/src/main/ets"
  platform_test: "harmony/entry/src/test"
  project_file: "harmony/build-profile.json5"

# ── 任务 ID 前缀覆盖 ──
task_prefix: TASK-HM

# ── 架构层级路径特化 ──
layer_paths:
  domain: "harmony/entry/src/main/ets/domain/"
  data: "harmony/entry/src/main/ets/data/"
  presentation: "harmony/entry/src/main/ets/presentation/"
  ui: "harmony/entry/src/main/ets/ui/"

# ── 语言特定约束 ──
constraints:
  - 使用 ArkTS（TypeScript 超集），遵循 HarmonyOS 类型严格模式
  - UI 层使用声明式 ArkUI（@Component + build() 方法）
  - 状态管理使用 @State / @Prop / @Link / @Provide + @Consume
  - 跨页面状态使用 AppStorage 或 LocalStorage
  - 网络请求使用 @ohos.net.http 或 @ohos/axios
  - 异步操作使用 async/await + Promise，禁止裸回调嵌套
  - 组件生命周期：aboutToAppear / aboutToDisappear 中管理资源
  - 禁止使用已废弃的 FA 模型 API，统一使用 Stage 模型

# ── 审查追加项 ──
review_extra:
  - ArkUI @Builder 是否正确抽取（避免单文件过大）
  - @State 变量是否有不必要的嵌套对象（导致无效刷新）
  - 是否正确使用 LazyForEach 替代 ForEach（列表性能）
  - 多设备适配：手机 / 折叠屏 / 平板的响应式布局（GridRow + breakpoints）
  - 是否使用 HarmonyOS 能力（如 Ability 跳转）而非自建路由

# ── 门控命令 ──
gate_commands:
  lint: "cd harmony && hvigorw lintHarDebug"
  build: "cd harmony && hvigorw assembleHap --mode module -p module=entry"
  test: "cd harmony && hvigorw test"

# ── QA 追加项 ──
qa_extra:
  - 在 Mate 60（直板机）和 Mate X5（折叠屏）各测一次
  - 折叠/展开切换时布局无异常
  - 深色模式 + 大字体下视觉检查
  - DevEco Profiler 检查内存和帧率
  - 后台返回前台场景下状态恢复正确
