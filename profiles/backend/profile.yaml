# Backend Team Profile
name: backend
label: 服务端
extends: base
task_prefix: TASK-BE

# ── 架构层级（单向依赖，从左到右）──
architecture:
  layers:
    - id: types
      label: Types
      path: src/types/
      description: TypeScript 接口和类型定义，不含运行时逻辑
      can_import: []

    - id: config
      label: Config
      path: src/config/
      description: 环境变量、常量配置，禁止包含业务逻辑
      can_import: [types]

    - id: repo
      label: Repo
      path: src/repo/
      description: 数据库查询/写入，仅做数据访问，禁止业务逻辑
      can_import: [types, config]

    - id: service
      label: Service
      path: src/service/
      description: 核心业务逻辑，必须有单元测试
      can_import: [types, config, repo]

    - id: runtime
      label: Runtime
      path: src/runtime/
      description: HTTP 路由、参数校验、响应格式化，调用 Service
      can_import: [types, config, repo, service]

  cross_cutting:
    - Auth（鉴权中间件，通过 Providers 注入）
    - Telemetry（结构化日志 / 指标 / Trace）
    - Feature Flags（特性开关）

# ── 任务拆分规则（Phase 02）──
task_split:
  strategy: layer_by_layer  # 按架构层从内到外
  order: [types, repo, service, runtime, test]
  template:
    - id: "{PREFIX}-01"
      name: Types 层
      output: "src/types/{feature}.ts"
      description: 请求体、响应体、错误类型定义

    - id: "{PREFIX}-02"
      name: Repo 层
      output: "src/repo/{entity}Repo.ts"
      description: 数据查询方法，不含业务逻辑

    - id: "{PREFIX}-03"
      name: Service 层
      output: "src/service/{feature}Service.ts"
      description: 核心业务逻辑，引用 Repo 层

    - id: "{PREFIX}-04"
      name: Controller 层
      output: "src/runtime/{feature}Controller.ts"
      description: 参数校验、调用 Service、格式化响应

    - id: "{PREFIX}-05"
      name: 单元测试
      output: "src/service/{feature}Service.test.ts"
      description: 覆盖所有 AC + 主要错误路径

# ── 代码审查重点（Phase 05）──
review_focus:
  must:
    - 架构层级合规：Service 是否导入了 Runtime/UI
    - 错误码是否使用已定义体系（error-codes.md）
    - 日志字段是否完整（userId, action, durationMs）
  recommend:
    - 过度 try-catch 检查（GP-004）
    - 文档漂移检查（接口参数是否同步到 docs/requirement/）

# ── 门控命令（Phase 06）──
gate_commands:
  lint: "golangci-lint run ./..."
  build: "go build ./..."
  test: "go test ./... -v -count=1"
  arch: "go vet ./..."

# ── QA 验收要求（Phase 06）──
qa:
  must:
    - 用 curl/Postman 逐条验证 AC 中定义的接口行为（含错误路径）
    - 确认结构化日志正确输出
    - 告警规则已配置（P0 问题 5 分钟内通知）
  recommend:
    - 压测关键接口：QPS 目标、超时配置、限流阈值
